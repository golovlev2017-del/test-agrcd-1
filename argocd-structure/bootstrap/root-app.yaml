# Root Application (App of Apps pattern)
# Это корневое приложение, которое управляет всеми остальными приложениями
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  # Источники для всех приложений
  source:
    repoURL: https://git.local.test/infrastructure/manifests.git
    targetRevision: HEAD
    path: applications
    
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  # SyncPolicy для корневого приложения
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Отслеживание ресурсов
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /status/currentReplicas
