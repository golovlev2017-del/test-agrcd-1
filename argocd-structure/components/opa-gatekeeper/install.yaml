# OPA Gatekeeper Installation for ArgoCD
# Source: https://open-policy-agent.github.io/gatekeeper/charts
# Offline mode: images from harbor.local.test:8443

apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
  labels:
    app.kubernetes.io/name: gatekeeper
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gatekeeper
  namespace: gatekeeper-system
spec:
  interval: 1h
  url: https://open-policy-agent.github.io/gatekeeper/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatekeeper
  namespace: gatekeeper-system
spec:
  interval: 1h
  chart:
    spec:
      chart: gatekeeper
      version: "3.22.0"
      sourceRef:
        kind: HelmRepository
        name: gatekeeper
        namespace: gatekeeper-system
  values:
    # Controller настройки
    image:
      repository: harbor.local.test:8443/library/openpolicyagent/gatekeeper
      tag: v3.22.0
    
    crds:
      image:
        repository: harbor.local.test:8443/library/openpolicyagent/gatekeeper-crds
        tag: v3.22.0
    
    controllerManager:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

      # Аудит включен
      audit:
        enabled: true
        replicas: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

    # Webhook настройки
    webhook:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi

    # Prometheus мониторинг
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true

    # Excluded namespaces (не применять политики к этим namespace)
    exemptNamespaces:
      - kube-system
      - gatekeeper-system
      - cert-manager

    # Обход ошибки с недоступным curl
    postInstall:
      labelNamespace:
        enabled: false
    postUpgrade:
      labelNamespace:
        enabled: false
---
# Пример ConstraintTemplate для проверки label
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
      validation:
        legacySchema: false
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlabels

        violation[{"msg": msg, "details": {"missingLabels": missing}}] {
          provided := {label | input.review.object.metadata.labels[label]}
          required := {label | label := input.parameters.labels[_]}
          missing := required - provided
          count(missing) > 0
          msg := sprintf("Missing required labels: %v", [missing])
        }
---
# Пример Constraint для обязательных label
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredLabels
metadata:
  name: require-app-labels
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
  parameters:
    labels: ["app", "environment"]
---
# Пример ConstraintTemplate для проверки ресурсов
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sresourcelimits
spec:
  crd:
    spec:
      names:
        kind: K8sResourceLimits
      validation:
        legacySchema: false
        openAPIV3Schema:
          type: object
          properties:
            cpuLimit:
              type: string
            memoryLimit:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sresourcelimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("Container <%v> must have CPU limit", [container.name])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("Container <%v> must have memory limit", [container.name])
        }
---
# Пример Constraint для лимитов ресурсов
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sResourceLimits
metadata:
  name: pod-resource-limits
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
  parameters:
    cpuLimit: "500m"
    memoryLimit: "512Mi"
