# Cert-Manager Installation for ArgoCD
# OFFLINE MODE: Все чарты должны быть предварительно загружены в локальный репозиторий
# Инструкция по подготовке:
#   1. helm pull jetstack/cert-manager --version v1.19.4
#   2. Загрузить chart в локальный репозиторий (Harbor/Nexus/ChartMuseum)
#   3. Все образы должны быть в harbor.local.test:8443

apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: jetstack-local
  namespace: cert-manager
spec:
  interval: 1h
  # OFFLINE: Укажите URL вашего локального репозитория чартов
  url: http://harbor.local.test:8443/chartrepo/library
  type: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "v1.19.4"
      sourceRef:
        kind: HelmRepository
        name: jetstack-local
        namespace: cert-manager
  values:
    installCRDs: true
    image:
      repository: harbor.local.test:8443/library/quay.io/jetstack/cert-manager-controller
      tag: v1.19.4
    cainjector:
      image:
        repository: harbor.local.test:8443/library/quay.io/jetstack/cert-manager-cainjector
        tag: v1.19.4
    webhook:
      image:
        repository: harbor.local.test:8443/library/quay.io/jetstack/cert-manager-webhook
        tag: v1.19.4
    startupapicheck:
      enabled: true
      image:
        repository: harbor.local.test:8443/library/quay.io/jetstack/cert-manager-startupapicheck
        tag: v1.19.4
---
# ClusterIssuer для Let's Encrypt (Production)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: nginx
---
# ClusterIssuer для Let's Encrypt (Staging)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
    - http01:
        ingress:
          class: nginx
