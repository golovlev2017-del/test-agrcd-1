# Grafana Installation for ArgoCD
# OFFLINE MODE: Все чарты должны быть предварительно загружены в локальный репозиторий
# Инструкция по подготовке:
#   1. helm pull grafana/grafana --version 7.3.6
#   2. Загрузить chart в локальный репозиторий (Harbor/Nexus/ChartMuseum)
#   3. Все образы должны быть в harbor.local.test:8443
#   4. Плагины должны быть предварительно скачаны и установлены offline

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-local
  namespace: monitoring
spec:
  interval: 1h
  # OFFLINE: Укажите URL вашего локального репозитория чартов
  url: http://harbor.local.test:8443/chartrepo/library
  type: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: "7.3.6"
      sourceRef:
        kind: HelmRepository
        name: grafana-local
        namespace: monitoring
  values:
    replicas: 1
    image:
      repository: harbor.local.test:8443/library/grafana/grafana
      tag: 11.5.0
    
    admin:
      existingSecret: grafana-admin-secret
    
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard
    
    env:
      GF_SERVER_PROTOCOL: "http"
      GF_SERVER_ROOT_URL: "https://grafana.local.test"
      GF_SERVER_TRUST_PROXY_HEADERS: "true"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    service:
      type: ClusterIP
      port: 80
    
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.local.test
      tls: []
    
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server.monitoring.svc.cluster.local:80
          access: proxy
          isDefault: true
          editable: true
        - name: VictoriaMetrics
          type: prometheus
          url: http://victoriametrics-server.monitoring.svc.cluster.local:8428
          access: proxy
          editable: true
    
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
    
    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 6417
          revision: 1
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 1
          datasource: Prometheus
        argocd-dashboard:
          gnetId: 14563
          revision: 1
          datasource: Prometheus
    
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        searchNamespace: ALL
    
    # OFFLINE: Плагины должны быть предварительно загружены в образ или volume
    # plugins:
    #   - grafana-clock-panel
    #   - grafana-piechart-panel
