# Grafana Installation for ArgoCD
# Source: https://grafana.com/docs/grafana/latest/setup-grafana/installation/kubernetes/

apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: "7.3.6"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    replicas: 1
    adminUser: admin
    adminPassword: changeme # Замените на секрет!
    
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    service:
      type: ClusterIP
      port: 80
    
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - grafana.example.com
      tls: []
    
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-server.monitoring.svc.cluster.local:80
          access: proxy
          isDefault: true
          editable: true
        - name: VictoriaMetrics
          type: prometheus
          url: http://victoriametrics-server.monitoring.svc.cluster.local:8428
          access: proxy
          editable: true
    
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
    
    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 6417
          revision: 1
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 1
          datasource: Prometheus
        argocd-dashboard:
          gnetId: 14563
          revision: 1
          datasource: Prometheus
    
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        searchNamespace: ALL
    
    plugins:
      - grafana-clock-panel
      - grafana-piechart-panel
