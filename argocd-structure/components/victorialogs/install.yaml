# VictoriaLogs Installation for ArgoCD
# Source: https://docs.victoriametrics.com/victorialogs/

apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/name: logging
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: victorialogs
  namespace: logging
spec:
  interval: 1h
  url: https://victoriametrics.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victorialogs
  namespace: logging
spec:
  interval: 1h
  chart:
    spec:
      chart: victorialogs-cluster
      version: "0.8.0"
      sourceRef:
        kind: HelmRepository
        name: victorialogs
        namespace: logging
  values:
    # VictoriaLogs Insert component
    victorialogs-insert:
      replicaCount: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      persistence:
        enabled: true
        size: 20Gi
        storageClassName: standard
    
    # VictoriaLogs Select component
    victorialogs-select:
      replicaCount: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    
    # VictoriaLogs Storage component
    victorialogs-storage:
      replicaCount: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      persistence:
        enabled: true
        size: 50Gi
        storageClassName: standard
    
    # VictoriaLogs UI
    victorialogs-ui:
      enabled: true
      replicaCount: 1
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - victorialogs.example.com
        tls: []
    
    # Fluent-bit для сбора логов
    fluent-bit:
      enabled: true
      config:
        outputs: |
          [OUTPUT]
              Name http
              Match *
              Host victorialogs-insert.logging.svc.cluster.local
              Port 9428
              Uri /insert/jsonline
              Format json_lines
              Logstash_Format false
              Retry_Limit False
              workers: 4
      
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      
      tolerations:
        - operator: Exists
      
      priorityClassName: system-node-critical
