# VictoriaLogs Values
# Наследует глобальные настройки из global-values.yaml

global:
  imagePullPolicy: IfNotPresent

# Образ
image:
  repository: harbor.local.test:8443/library/victoriametrics/victoria-logs
  tag: v1.36.0
  pullPolicy: IfNotPresent

# Порт
server:
  port: 9428
  
  # Хранилище
  persistentVolume:
    enabled: true
    size: 100Gi
    storageClass: nfs-storage
    accessModes:
      - ReadWriteOnce
      
  # Ресурсы
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 4Gi
      
  # Настройки хранения
  retentionPeriod: "7"  # 7 дней
  
  # Дополнительные аргументы
  extraArgs:
    httpListenAddr: :9428
    storageDataPath: /victoria-logs-data
    
# Service
service:
  enabled: true
  type: ClusterIP
  port: 9428

# Node Selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Метрики для Prometheus
serviceMonitor:
  enabled: false
  namespace: monitoring
  
# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
