# Node Exporter Values
# Наследует глобальные настройки из global-values.yaml

global:
  imagePullPolicy: IfNotPresent

# Образ
image:
  repository: harbor.local.test:8443/library/prometheus/node-exporter
  tag: v1.10.0
  pullPolicy: IfNotPresent

# Port
service:
  enabled: true
  type: ClusterIP
  port: 9100
  targetPort: 9100

# Ресурсы
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# Node Selector
nodeSelector:
  kubernetes.io/os: linux

# Tolerations для работы на всех нодах включая master
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

# Host Network (требуется для сбора метрик хоста)
hostNetwork: true
hostPID: true

# Дополнительные аргументы
extraArgs:
  - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
  - --collector.netclass.device-exclude=^(veth.*|docker.*|cni.*|flannel.*)$

# Prometheus ServiceMonitor
prometheus:
  monitor:
    enabled: false
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
